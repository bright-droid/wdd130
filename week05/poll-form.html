<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Form - User Poll</title>
</head>
<body>
    <header>
        <h1>WDD 130 | Bright Ndubuisi | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label>Full Name: <input type="text" name="fullname">
                </label><br>
                <label>Email: <input type="email" id="useremail">
                </label>
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                
                <label for="browser">What is your favorite internet browser?</label>
                <select id="browser" name="browser">
                    <option value="opera">Opera</option>
                    <option value="firefox">Firefox</option>
                    <option selected value="chrome">Chrome</option>
                    <option value="edge">Edge</option>
                </select><br>
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet"><br>
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mali"></textarea>

            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©2025 | HTML Form - User Poll Activity | Bright Ndubuisi</p>
    </footer>
</body>
</html>
